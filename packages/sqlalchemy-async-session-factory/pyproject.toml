[project]
name = "sqlalchemy-async-session-factory"
version = "0.1.0"
description = "Factory functions for SQLAlchemy async engine and session management"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "GridFlow Team", email = "vialogue@proton.me"}
]

dependencies = [
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",  # PostgreSQL async driver
]

[project.urls]
Homepage = "https://github.com/firstunicorn/python-web-toolkit"
Repository = "https://github.com/firstunicorn/python-web-toolkit"

[project.optional-dependencies]
sqlite = ["aiosqlite>=0.19.0"]  # SQLite async driver
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
]

[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)",
    "hypothesis (>=6.151.5,<7.0.0)",
    "pytest-asyncio (>=0.21.0)",
    "aiosqlite (>=0.19.0)"
]

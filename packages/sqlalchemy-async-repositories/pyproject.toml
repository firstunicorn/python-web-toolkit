[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sqlalchemy-async-repositories"
version = "0.1.0"
description = "Async repository pattern implementation for SQLAlchemy"
readme = "README.md"
requires-python = ">=3.10,<4"
license = {text = "MIT"}
authors = [
    {name = "GridFlow Team", email = "vialogue@proton.me"}
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "sqlalchemy[asyncio]>=2.0.0",
    "pydantic>=2.0.0"
]

[project.optional-dependencies]
fastcrud = ["fastcrud>=0.12.0"]
dev = ["pytest>=7.0", "black", "mypy", "ruff", "pytest-asyncio", "aiosqlite>=0.19.0"]

[project.urls]
Homepage = "https://github.com/firstunicorn/python-web-toolkit"
Repository = "https://github.com/firstunicorn/python-web-toolkit"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)",
    "pytest-asyncio (>=0.23.0)",
    "aiosqlite (>=0.19.0)",
    "hypothesis (>=6.151.5,<7.0.0)"
]







[project]
name = "python-cqrs-dispatcher"
version = "0.1.0"
description = "CQRS dispatcher integrating python-cqrs-core with gridflow-python-mediator"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "GridFlow Team", email = "vialogue@proton.me"}
]

dependencies = [
    "python-cqrs-core",
    "gridflow-python-mediator",
]

[project.urls]
Homepage = "https://github.com/firstunicorn/python-web-toolkit"
Repository = "https://github.com/firstunicorn/python-web-toolkit"

[tool.setuptools.dynamic]
# For local development - install sibling packages first
# poetry install in each package directory

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
]

[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[project]
name = "python-infrastructure-exceptions"
version = "0.1.0"
description = "Infrastructure layer exception classes for Python applications"
authors = [
    {name = "GridFlow Team", email = "vialogue@proton.me"}
]
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://github.com/firstunicorn/python-web-toolkit"
Repository = "https://github.com/firstunicorn/python-web-toolkit"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]


[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)",
    "hypothesis (>=6.151.5,<7.0.0)"
]
